name: CI

on:
  push:
    branches: [main, development]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Sandbox smoke (verify:local:only)
        run: npm run verify:local:only
