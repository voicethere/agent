name: Agent tests

on:
  workflow_call:
    inputs:
      always_run:
        description: Run full test suite regardless of path filters (release tags)
        required: false
        type: boolean
        default: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vitest*'
              - 'eslint*'
              - 'prettier*'
              - '!**/*.md'
            workflows:
              - '.github/**'

  test:
    needs: changes
    if: |
      inputs.always_run == true ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, build, and tests
        run: npm run test:ci

      - name: Sandbox smoke (verify:local:only)
        run: npm run verify:local:only

  skip:
    needs: changes
    if: |
      inputs.always_run != true &&
      needs.changes.outputs.code != 'true' &&
      needs.changes.outputs.workflows != 'true' &&
      (github.event_name == 'pull_request' || github.event_name == 'workflow_call')
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipping tests"
